name: Python CI

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            -main

jobs:
    build:

        runs-on: ubuntu-latest

        steps:
          - name: Checkout Repository
            uses: actions/Checkout@v4

          - name: Setup Python
            uses: actions/Setup-python@v5
            with:
              python version: '3.10'

          - name: Install Dependencies
            run: |
              python -m pip install --upgrade pip
              pip install -r requriments.txt  

          - name: Run Tests
            run:
              Pytest    
      

